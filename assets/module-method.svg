<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc"><title id="title">Method path visual</title><desc id="desc">A six-step path from knowledge discovery to asset improvement.</desc><defs><linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#1e293b"/><stop offset="1" stop-color="#713f12"/></linearGradient></defs><rect width="1200" height="420" fill="url(#bg)"/><circle cx="90" cy="330" r="180" fill="#facc15" opacity=".11"/><circle cx="1100" cy="80" r="220" fill="#38bdf8" opacity=".09"/><path d="M120 245 C260 115 390 325 530 190 S830 100 1035 230" fill="none" stroke="#fde68a" stroke-width="12" stroke-linecap="round" opacity=".88"/><g font-family="Arial, sans-serif" font-weight="800"><g transform="translate(92 215)"><circle r="42" fill="#facc15"/><text y="10" text-anchor="middle" font-size="25" fill="#111827">01</text></g><g transform="translate(260 142)"><circle r="42" fill="#93c5fd"/><text y="10" text-anchor="middle" font-size="25" fill="#111827">02</text></g><g transform="translate(445 246)"><circle r="42" fill="#5eead4"/><text y="10" text-anchor="middle" font-size="25" fill="#111827">03</text></g><g transform="translate(640 148)"><circle r="42" fill="#fda4af"/><text y="10" text-anchor="middle" font-size="25" fill="#111827">04</text></g><g transform="translate(845 138)"><circle r="42" fill="#c4b5fd"/><text y="10" text-anchor="middle" font-size="25" fill="#111827">05</text></g><g transform="translate(1035 230)"><circle r="42" fill="#bbf7d0"/><text y="10" text-anchor="middle" font-size="25" fill="#111827">06</text></g></g><text x="68" y="68" fill="#fef3c7" font-family="Arial, sans-serif" font-size="30" font-weight="800">Discover → Structure → Create → Register → Publish → Improve</text></svg>